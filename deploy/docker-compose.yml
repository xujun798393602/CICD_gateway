version: '3.8'

services:
  # ==================== 应用服务 ====================
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: quality-gate-app
    restart: always
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-gate_user}
      - DB_PASSWORD=${DB_PASSWORD:-GatePass123!}
      - DB_NAME=${DB_NAME:-quality_gate}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REPORT_PATH=/app/reports
      - SCAN_TIMEOUT=${SCAN_TIMEOUT:-600}
      - MAX_PARALLEL_GATES=${MAX_PARALLEL_GATES:-4}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - GITLAB_URL=${GITLAB_URL:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - DEBUG=${DEBUG:-false}
    volumes:
      - app_logs:/app/logs
      - app_reports:/app/reports
      - app_config:/app/config
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quality-gate-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==================== MySQL数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: quality-gate-mysql
    restart: always
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-RootPass123!}
      - MYSQL_DATABASE=${DB_NAME:-quality_gate}
      - MYSQL_USER=${DB_USER:-gate_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-GatePass123!}
      - TZ=Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - quality-gate-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-RootPass123!}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Redis缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: quality-gate-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - quality-gate-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Nginx反向代理 ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: quality-gate-nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - app_reports:/var/www/reports:ro
      - nginx_logs:/var/log/nginx
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - quality-gate-net

  # ==================== 报告Web服务 ====================
  report-server:
    image: nginx:1.25-alpine
    container_name: quality-gate-report
    restart: always
    ports:
      - "${REPORT_PORT:-8080}:80"
    volumes:
      - app_reports:/usr/share/nginx/html:ro
      - ./nginx/report-server.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - quality-gate-net

# ==================== 数据卷 ====================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_reports:
    driver: local
  app_config:
    driver: local
  nginx_logs:
    driver: local

# ==================== 网络 ====================
networks:
  quality-gate-net:
    driver: bridge
