server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 报告页面
    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;

        # 缓存配置
        expires 30m;
        add_header Cache-Control "public, no-transform";
    }

    # HTML文件
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, no-transform";
        charset utf-8;
    }
}
